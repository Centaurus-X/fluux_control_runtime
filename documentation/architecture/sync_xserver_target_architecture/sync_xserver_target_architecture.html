<style>
#arch svg { max-width: 100%; height: auto; }
</style>
<h2 class="sr-only">Target architecture: main process with single-writer, event router, thread management and parallel runtime workers with dedicated writers, rule engines and adapters.</h2>
<div id="arch"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    primaryColor: dark ? '#1e3a5f' : '#E6F1FB',
    primaryTextColor: dark ? '#B5D4F4' : '#0C447C',
    primaryBorderColor: dark ? '#378ADD' : '#185FA5',
    lineColor: dark ? '#9c9a92' : '#5F5E5A',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    mainBkg: dark ? '#1e3a5f' : '#E6F1FB',
    clusterBkg: dark ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.02)',
    clusterBorder: dark ? '#5F5E5A' : '#B4B2A9',
  },
  flowchart: { htmlLabels: true, curve: 'basis', nodeSpacing: 30, rankSpacing: 40 },
});
const src = `flowchart TB
    subgraph MAIN["Main Process"]
        direction TB
        SW["Single-Writer<br/>HEAP — Central SoT<br/>(formerly SEM)"]
        DS["DataStore"]
        CS["Compiler System"]
        MQTT["MQTT Interface"]
        IO["IN/OUT Adapter"]
        ER_EXT["Event-Router<br/>internal / external"]
        DS <--> CS
        MQTT <--> IO
        SW -.writes.-> DS
        IO --> ER_EXT
        ER_EXT --> SW
    end
    subgraph TM["Thread Management"]
        direction TB
        ER_WRK["Event-Router<br/>internal / worker"]
    end
    subgraph W1["Runtime Worker (Ctrl_1)"]
        direction TB
        WW1["Worker-Writer<br/>Data Chunking"]
        GRE1["Generic Rule<br/>Engine Thread"]
        ER_INT1["Event-Router<br/>internal"]
        TP1["ThreadPool"]
        AT1["Automation<br/>Thread"]
        AA1["Automation<br/>Adapter"]
        CT1["Controller<br/>Tasks"]
        HW1["Hardware /<br/>Bus Adapter"]
        TP1 <--> AT1
        AT1 <--> AA1
        CT1 <--> HW1
        GRE1 --> ER_INT1
        ER_INT1 --> WW1
    end
    subgraph WN["Runtime Worker (Ctrl_n)"]
        direction TB
        WWN["Worker-Writer<br/>Data Chunking"]
        GREN["Generic Rule<br/>Engine Thread"]
        ER_INTN["Event-Router<br/>internal"]
        TPN["ThreadPool"]
        ATN["Automation<br/>Thread"]
        AAN["Automation<br/>Adapter"]
        CTN["Controller<br/>Tasks"]
        HWN["Hardware /<br/>Bus Adapter"]
        TPN <--> ATN
        ATN <--> AAN
        CTN <--> HWN
        GREN --> ER_INTN
        ER_INTN --> WWN
    end
    MAIN --> TM
    TM --> W1
    TM --> WN
    ER_EXT -->|priority dispatch| ER_WRK
    ER_WRK -->|chunked config| W1
    ER_WRK -->|chunked config| WN
    WW1 -->|CONFIG_PATCH| SW
    WWN -->|CONFIG_PATCH| SW
    SW -.CONFIG_CHANGED.-> ER_WRK`;
const { svg } = await mermaid.render('arch-svg', src);
document.getElementById('arch').innerHTML = svg;
</script>
