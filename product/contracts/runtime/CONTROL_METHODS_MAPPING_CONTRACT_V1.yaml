    merge_policy: explicit_field_merge
    rollback_policy: restore_previous_row
    resolved_method_id: 1
    resolved_template_id: 1
    resolved_algorithm_type: ramp
    resolved_parameters:
      v0: 20.0
      v1: 80.0
      t_ramp: 600
    resolved_owner_context_ref: worker_process_state_management
    resolved_worker_refs: [worker_automation_0]
    requires_review: false

