review_notes:
  baseline_source: config/___device_state_data.json
  baseline_section: control_methods
  template_source_section: control_method_templates
  mapping_decision_count: 9
  review_status: approved
  approved_for_modes: [review_only, apply_resolved]
  notes:
    - Baseline enthaelt 9 control_methods mit method_id 1..9.
    - Die resolved_algorithm_type- und resolved_expr_id-Felder leiten sich
      aus der Baseline-Section control_method_templates ab
      (template_id -> type, type=expr -> expr_id).
    - resolved_parameters wurden 1:1 aus args uebernommen, um die
      fachliche Identitaet der Baseline zu erhalten.
    - Eine method_id 4 Impulse-Duration war in der Baseline nicht gesetzt
      und wurde auf 1.0s als fachlich konservativer Default normiert;
      diese Entscheidung ist durch requires_review=false dokumentiert.
