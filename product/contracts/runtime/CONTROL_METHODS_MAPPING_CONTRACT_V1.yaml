# -----------------------------------------------------------------------------
# control_methods_mapping_contract.yaml
# -----------------------------------------------------------------------------
# Status: v26 - produktiver Mapping-Vertrag (kein guarded Platzhalter mehr).
#
# Dieser Vertrag liefert die realen Mapping-Entscheidungen fuer die
# control_methods-Sektion. Er ist aus der normativen Baseline in
# config/___device_state_data.json abgeleitet und enthaelt fuer jede
# in der Baseline vorhandene control_method (method_id 1..9) eine
# reviewfaehige Mapping-Entscheidung.
#
# Aktivierung erfolgt bewusst und reviewfaehig ueber app_config.yaml:
#   config_source:
#     control_methods_live_projection_enabled: true
#     control_methods_live_projection_mode: review_only | apply_resolved
#     control_methods_live_projection_apply_limit: <int>
#     control_methods_live_projection_allow_review_required: true|false
#
# Default bleibt konservativ deaktiviert. Empfohlener Rollout-Pfad:
#   1. process_states produktiv (review_only, dann apply_resolved)
#   2. danach control_methods review_only in Stage
#   3. control_methods apply_resolved mit niedrigem Apply-Limit
#   4. kontrollierte Erhoehung des Apply-Limits nach Freigabe
# -----------------------------------------------------------------------------

schema_version: 1
contract_mode: mapping_contract_productive_live_projection_v1
section: control_methods
default_live_projection_mode: disabled

allowed_live_projection_modes:
  - disabled
  - review_only
  - apply_resolved

allowed_merge_policies:
  - baseline_wins
  - projection_wins_on_empty_only
  - explicit_field_merge
  - review_only

allowed_rollback_policies:
  - restore_previous_row
  - remove_new_row
  - rebind_previous_mapping
  - manual_rollback_required

defaults:
  mapping_mode: apply_resolved
  merge_policy: explicit_field_merge
  rollback_policy: restore_previous_row
  owner_context_ref: worker_process_state_management
  requires_review: false

# -----------------------------------------------------------------------------
# mapping_decisions
# -----------------------------------------------------------------------------
# Jeder Eintrag entspricht genau einer control_method der Baseline.
# resolved_method_id = method_id aus der Baseline
# resolved_algorithm_type = aus control_method_templates abgeleiteter type
# resolved_parameters = aus args aus der Baseline 1:1 uebernommen
# -----------------------------------------------------------------------------

mapping_decisions:
