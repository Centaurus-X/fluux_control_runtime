schema_version: 1
contract_id: C25
contract_name: PROXY_WORKER_BRIDGE_CONTRACT_V1
status: active_compatibility_runtime
release: v35_1_preproduction_final_runtime
owner_component: product/src/core/proxy_worker_bridge.py
purpose: Worker-side MQTT/MQTTS bridge to the external Product Proxy Gateway.
role_boundaries:
  worker:
    owns:
      - local_runtime_truth
      - local_command_acceptance
      - local_event_source
      - worker_side_topic_acl_precheck
      - local_runtime_health_snapshot
    must_not_own:
      - proxy_user_registry
      - broker_global_acl_truth
      - gateway_postgresql_registry
      - global_auth_audit_persistence
      - master_config_assignment_truth
  proxy_gateway:
    owns:
      - websocket_client_sessions
      - client_authentication
      - registry_auth_audit_persistence
      - postgresql_backup_restore
      - external_topic_routing_policy
    must_not_own:
      - worker_hot_state_truth
      - local_io_write_order
communication:
  transport: mqtt_or_mqtts_via_broker
  broker_default_host: 192.168.0.31
  mqtt_plain_port: 1883
  mqtts_port: 8883
  envelope_version: proxy-envelope-v1
topics:
  proxy_to_worker_command: worker/{worker_id}/command/{domain}
  worker_to_proxy_reply: worker/{worker_id}/reply/{client_id}
  worker_to_proxy_event: worker/{worker_id}/event/{domain}
  worker_to_proxy_presence: worker/{worker_id}/presence
  worker_to_proxy_snapshot: worker/{worker_id}/snapshot/{domain}
qos_policy:
  command: 2
  reply: 1
  event: 1
  presence: 1
  snapshot: 1
presence:
  retain: true
  interval_s_default: 30
commands:
  accepted_domains:
    - runtime
    - snapshot
  command_event_emit: V35_1_PROXY_RUNTIME_COMMAND_RECEIVED
  legacy_command_events:
    - V34_PROXY_RUNTIME_COMMAND_RECEIVED
    - V33_PROXY_WORKER_COMMAND_RECEIVED
    - V32_PROXY_WORKER_COMMAND_RECEIVED
  target_guard: target.ref must match worker_id when present
  auto_reply_default: true
  direct_fieldbus_io_write: false
snapshots:
  default_delivery: mqtt_direct
  large_snapshot_strategy_planned: mqtt_chunked_or_external_download
security:
  mqtts:
    supported: true
    ca_cert_file_default: product/config/ssl/certs/mqtt/emqx-root-ca.pem
    tls_ciphers_default: null
    empty_cipher_string_rule: treat_as_null
  credentials:
    username_password: configurable
    username_env_default: PROXY_WORKER_BRIDGE_USERNAME
    password_env_default: PROXY_WORKER_BRIDGE_PASSWORD
  mtls:
    mode_values:
      - disabled
      - optional
      - required
    default_mode: optional
  topic_acl:
    worker_side_precheck: true
    default_policy: deny
    default_publish_patterns:
      - worker/{worker_id}/reply/#
      - worker/{worker_id}/presence
      - worker/{worker_id}/snapshot/#
      - worker/{worker_id}/event/#
    default_subscribe_patterns:
      - worker/{worker_id}/command/+
compatibility:
  proxy_gateway_min_version: v01.8.6
  legacy_event_input: true
  default_enabled: true
postgresql_scope:
  worker_local_dependency: false
  owner: external_product_proxy_gateway
acceptance:
  - bridge_disabled_must_not_change_runtime_core
  - bridge_enabled_subscribes_to_worker_command_wildcard
  - bridge_publishes_retained_presence
  - bridge_replies_to_client_specific_reply_topic
  - bridge_emits_v35_1_internal_command_event
  - bridge_keeps_legacy_command_event_compatibility
  - bridge_denies_topics_outside_worker_acl
