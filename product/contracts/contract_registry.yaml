schema_version: 1
registry_id: CONTRACT_REGISTRY_V1
status: active_runtime_resolved
product_release_target: v35_1_preproduction_final_runtime
canonical_contract_root: product/contracts
intent: Single Source of Truth fuer Sichtbarkeit, Klassifizierung und Verknuepfung
  der Vertragslandschaft.
naming_policy:
  formal_contract_files: UPPER_SNAKE_CASE_WITH_VERSION
  runtime_contract_files: UPPER_SNAKE_CASE_WITH_VERSION
  data_contract_files: UPPER_SNAKE_CASE_WITH_VERSION
  legacy_aliases: removed_from_product_config_contracts_in_v31
canonical_directory_layout:
  formal: product/contracts/formal
  runtime: product/contracts/runtime
  data: product/contracts/data
  examples: product/contracts/examples
  matrices: product/contracts/matrices
  archive: product/contracts/archive
  registry: product/contracts/contract_registry.yaml
runtime_resolution:
  mode: contract_id_to_registry_path
  owner: product/src/orchestration/runtime_config.py
  configured_registry_path: product/config/application/app_config.yaml#contract_registry.registry_path
  strict_default: true
  runtime_contract_ids:
    process_states_mapping: C08
    control_methods_mapping: C17
    proxy_worker_bridge: C25
    runtime_command_binding: C26
    runtime_command_activation_binding: C27
  rule: app_config selects Contract-IDs only; concrete runtime_instance paths are
    resolved from this registry.
representation_values:
  formal_only: Nur normative Spezifikation, nicht direkt runtime-geladen.
  runtime_loaded: YAML/JSON wird zur Laufzeit geladen.
  code_enforced: Vertrag wird durch Code/Algorithmus/Guardrail vollzogen.
  formal_and_code: Spezifikation plus Code-Enforcement.
  formal_runtime_and_code: Spezifikation plus runtime-geladene Instanz plus Code-Enforcement.
  formal_code_and_data_candidate: Aktuell Code-Enforcement; datenartige Teilmenge
    kann externalisiert werden.
  formal_data_and_code: Spezifikation plus externalisierter Datenvertrag plus Code-Enforcement.
  formal_reference: Referenz-/Migrations-/Prozessdokument, kein operativer Runtime-Vertrag.
global_rules:
- product/contracts ist langfristig die zentrale Vertragsheimat.
- product/config bleibt fuer operative Instanzkonfiguration, nicht fuer normative
  Spezifikation.
- runtime_mapping YAMLs sind kanonisch unter product/contracts/runtime.
- v35.1 Runtime-Komponenten duerfen operative Contract-Dateipfade nicht mehr aus app_config
  ableiten, sondern muessen Contract-IDs ueber diese Registry aufloesen.
- product/config/contracts ist seit v31 aus dem Produkt entfernt; verbleibende historische
  Kopien ausserhalb von product sind nicht kanonisch.
- Algorithmen bleiben Code; nur datenartige Vertragsbestandteile werden externalisiert.
- contract_registry.yaml ist Register und Verknuepfungsschicht, nicht selbst der Algorithmus.
