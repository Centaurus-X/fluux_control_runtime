$schema: https://json-schema.org/draft/2020-12/schema
$id: https://example.local/schemas/compile_request.schema.yaml
title: Compile Request
type: object
required: [request_id, source_cud_path, output_dir]
properties:
  request_id: {type: string}
  source_cud_path: {type: string}
  output_dir: {type: string}
  options:
    type: object
    properties:
      strict_validation: {type: boolean}
      preserve_placeholders: {type: boolean}
      build_backrefs: {type: boolean}
      include_hashes: {type: boolean}
    additionalProperties: true
additionalProperties: true
