  rule_sources:
  - domain_ref: LDC_REACTOR_A_MAIN
    id: RULE_CONTROL_HEAT_PID
    placeholders:
      advanced_control_methods:
        pid_profile_ref: PID_STD_01
    priority: 700
    stage: control
    then:
      compute:
        inputs:
        - SIG_REACTOR_TEMP_PV
        - SIG_REACTOR_TEMP_SP
        limits:
          max: 100.0
          min: 0.0
        output_signal_ref: SIG_REACTOR_HEATER_CV
        strategy: placeholder_pid
    when:
      all:
      - fsm_ref: FSM_HEAT_LOOP
        state_is: RUNNING
  - domain_ref: LDC_REACTOR_A_MAIN
    id: RULE_FSM_START
    priority: 800
    stage: fsm
    then:
      force_fsm_state:
      - fsm_ref: FSM_HEAT_LOOP
        state: RUNNING
    when:
      all:
      - command_ref: CMD_HEAT_START
      - fsm_ref: FSM_HEAT_LOOP
        state_is: IDLE
  - domain_ref: LDC_REACTOR_A_MAIN
    id: RULE_GUARD_PRESSURE_HIGH
    priority: 900
    stage: guard
    then:
      deny_commands:
      - CMD_HEAT_START
    when:
      all:
      - op: greater_than
        signal_ref: SIG_REACTOR_PRESS_PV
        value: 8.0
  - domain_ref: LDC_REACTOR_A_MAIN
    id: RULE_NOTIFY_HEAT_READY
    priority: 100
    stage: notification
    then:
      emit:
      - code: HEAT_READY
        kind: notification
    when:
      all:
      - op: greater_or_equal
        signal_ref: SIG_REACTOR_TEMP_PV
        value: 119.0
  - domain_ref: LDC_REACTOR_A_MAIN
    id: RULE_SAFETY_ESTOP
    priority: 1000
    stage: safety
    then:
      force_fsm_state:
      - fsm_ref: FSM_HEAT_LOOP
        state: INTERLOCK
      set_signals:
      - signal_ref: SIG_REACTOR_HEATER_CV
        value: 0.0
      - signal_ref: SIG_REACTOR_COOLING_VALVE_CV
        value: 0.0
    when:
      all:
      - op: equals
        signal_ref: SIG_REACTOR_ESTOP
        value: true
  - domain_ref: LDC_REACTOR_A_MAIN
    else:
      set_signals:
      - signal_ref: SIG_REACTOR_COOLING_VALVE_CV
        value: 0.0
    id: RULE_SEQUENCE_COOLING_SUPPORT
    priority: 600
    stage: sequence
    then:
      set_signals:
      - signal_ref: SIG_REACTOR_COOLING_VALVE_CV
        value: 35.0
    when:
      all:
      - op: greater_than
        signal_ref: SIG_REACTOR_TEMP_PV
        value: 125.0
