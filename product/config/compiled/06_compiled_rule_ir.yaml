  priority: 700
  rule_hash: f410f70d2a13d0453fa8d97c2a79139711d09944a7cf53a94b9d764b3dc00a89
  source_ref: RULE_CONTROL_HEAT_PID
  stage: control
- domain_ref: LDC_REACTOR_A_MAIN
