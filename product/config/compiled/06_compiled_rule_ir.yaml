      state: INTERLOCK
    set_signals:
    - signal_ref: SIG_REACTOR_HEATER_CV
      value: 0.0
    - signal_ref: SIG_REACTOR_COOLING_VALVE_CV
      value: 0.0
  normalized_when:
    all:
    - op: equals
      signal_ref: SIG_REACTOR_ESTOP
      value: true
  owner_context_ref: LDC_REACTOR_A_MAIN
  placeholders: {}
