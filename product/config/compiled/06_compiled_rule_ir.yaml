- domain_ref: LDC_REACTOR_A_MAIN
  id: RULE_GUARD_PRESSURE_HIGH
  normalized_else: {}
  normalized_then:
    deny_commands:
    - CMD_HEAT_START
  normalized_when:
    all:
    - op: greater_than
      signal_ref: SIG_REACTOR_PRESS_PV
      value: 8.0
