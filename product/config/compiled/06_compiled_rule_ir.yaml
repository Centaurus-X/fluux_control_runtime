  stage: fsm
- domain_ref: LDC_REACTOR_A_MAIN
  id: RULE_CONTROL_HEAT_PID
  normalized_else: {}
  normalized_then:
    compute:
      inputs:
      - SIG_REACTOR_TEMP_PV
      - SIG_REACTOR_TEMP_SP
