- domain_ref: LDC_REACTOR_A_MAIN
  id: RULE_FSM_START
  normalized_else: {}
  normalized_then:
    force_fsm_state:
    - fsm_ref: FSM_HEAT_LOOP
      state: RUNNING
  normalized_when:
    all:
    - command_ref: CMD_HEAT_START
    - fsm_ref: FSM_HEAT_LOOP
      state_is: IDLE
  owner_context_ref: LDC_REACTOR_A_MAIN
  placeholders: {}
  priority: 800
