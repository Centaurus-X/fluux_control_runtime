# -----------------------------------------------------------------------------
# process_states_mapping_contract.yaml
# -----------------------------------------------------------------------------
# Status: v26 - produktiver Mapping-Vertrag (kein Platzhalter mehr).
#
# Dieser Vertrag liefert die realen Mapping-Entscheidungen fuer die
# process_states-Sektion, abgeleitet aus der normativen Baseline in
# config/___device_state_data.json. Jede Zeile in records entspricht einem
# real vorhandenen process_state-Eintrag der Baseline.
#
# Aktivierung erfolgt bewusst und reviewfaehig ueber app_config.yaml:
#   config_source:
#     process_states_live_projection_enabled: true
#     process_states_live_projection_mode: review_only | apply_resolved
#     process_states_live_projection_apply_limit: <int>
#     process_states_live_projection_allow_review_required: true|false
#
# Default bleibt konservativ deaktiviert. Der sichere Betriebsweg ist:
#   1. review_only in einer Stage-Umgebung
#   2. apply_resolved mit niedrigem Apply-Limit in produktiver Stage
#   3. schrittweise Erhoehung des Apply-Limits nach Freigabe
# -----------------------------------------------------------------------------

schema_version: 1
mapping_contract_ref: PSTATEMAP_CONTRACT_PRODUCTIVE_V1
target_section: process_states
mode: productive

# Default-Policies fuer alle records, sofern nicht record-spezifisch ueberschrieben.
defaults:
  merge_policy: baseline_wins
  rollback_policy: restore_previous_row
  owner_context_ref: worker_process_state_management
  requires_review: false

allowed_merge_policies:
  - baseline_wins
  - projection_wins_on_empty_only
  - explicit_field_merge
  - review_only

allowed_rollback_policies:
  - restore_previous_row
  - remove_new_row
  - rebind_previous_mapping
  - manual_rollback_required

# -----------------------------------------------------------------------------
# records
# -----------------------------------------------------------------------------
# Jeder Eintrag beschreibt die Mapping-Entscheidung fuer genau einen
# process_state der Baseline. Die state_id und die fachliche Schluessel-
# kombination (p_id, mode_id, mapping_id) sind aus der Baseline uebernommen.
# -----------------------------------------------------------------------------

