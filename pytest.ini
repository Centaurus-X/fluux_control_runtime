# pytest.ini - scoped runtime test discovery
#
# Only the production runtime subtree is collected. Documentation, reports,
# archives and other reference material are intentionally excluded to avoid
# duplicate test-module names and stale historical artifacts.

[pytest]
testpaths =
    product

norecursedirs =
    documentation
    source_inputs
    archive
    reports
    scratch
    contracts
    planning
    .git
    .pytest_cache
    __pycache__
    *.egg-info

python_files = test_*.py
python_classes = Test*
python_functions = test_*
